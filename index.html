<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💥 Dodge Mania Chaos</title>
<style>
  body { margin:0; overflow:hidden; background: linear-gradient(to bottom, #4facfe, #00f2fe); font-family:sans-serif; touch-action:none; }
  canvas { display:block; background: rgba(255,255,255,0.05); }
  #score, #level { position:absolute; left:50%; transform:translateX(-50%); color:#fff; text-shadow:2px 2px #000; }
  #score { top:20px; font-size:24px; font-weight:bold; }
  #level { top:60px; font-size:20px; }
</style>
</head>
<body>
<div id="score">Score: 0</div>
<div id="level">Level: 1</div>
<canvas id="game"></canvas>

<script>
// Canvas setup
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let width = window.innerWidth;
let height = window.innerHeight;
canvas.width = width;
canvas.height = height;

// Game variables
let player = {x:width/2, y:height-100, size:60, color:'#ff3f3f', speed:15};
let objects = [];
let enemies = [];
let powerUps = [];
let particles = [];
let score = 0;
let level = 1;
let gameOver = false;
let powerActive = {shield:false, slow:false};
let tornadoActive = false;

// Sounds
const hitSound = new Audio('https://www.soundjay.com/buttons/sounds/button-10.mp3');
const powerSound = new Audio('https://www.soundjay.com/buttons/sounds/button-3.mp3');

// Helpers
function random(min,max){return Math.random()*(max-min)+min;}

// Spawn objects
function createObject(){ 
  let size=random(20,50);
  objects.push({x:random(size,width-size), y:-size, size:size, speed:random(3+level,6+level), color:`hsl(${Math.random()*360},70%,50%)`});
}

// Spawn enemies
function createEnemy(){
  let size=50;
  enemies.push({x:random(size,width-size), y:-size, size:size, speed:2+level*0.5, color:'#ff0'});
}

// Spawn power-ups
function createPowerUp(){
  let size=40;
  let types = ['shield','slow','tornado'];
  powerUps.push({
    x:random(size,width-size),
    y:-size,
    size:size,
    speed:2,
    type:types[Math.floor(Math.random()*types.length)],
    color:'#0ff'
  });
}

// Player
function drawPlayer(){
  ctx.fillStyle = powerActive.shield ? '#0ff' : player.color;
  ctx.beginPath();
  ctx.arc(player.x,player.y,player.size/2,0,Math.PI*2);
  ctx.fill();
}

// Objects, enemies, power-ups
function drawArray(arr){ arr.forEach(o=>{ctx.fillStyle=o.color;ctx.beginPath();ctx.arc(o.x,o.y,o.size/2,0,Math.PI*2);ctx.fill();}); }

// Particles
function createParticles(x,y,color){
  for(let i=0;i<10;i++){particles.push({x:x,y:y,vx:random(-4,4),vy:random(-4,4),size:random(2,5),color:color,life:20});}
}
function drawParticles(){
  particles.forEach((p,i)=>{ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill(); p.x+=p.vx; p.y+=p.vy; p.life--; if(p.life<=0) particles.splice(i,1);});
}

// Update objects & collisions
function updateObjects(){
  objects.forEach((obj,i)=>{
    obj.y += obj.speed * (powerActive.slow?0.5:1);
    if(tornadoActive){ obj.x += Math.sin(Date.now()/100)*2; }
    let dx = obj.x-player.x, dy=obj.y-player.y, dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<obj.size/2+player.size/2){ if(powerActive.shield){createParticles(player.x,player.y,obj.color); objects.splice(i,1); powerActive.shield=false;} else {hitSound.play(); gameOver=true;} }
    if(obj.y-obj.size/2>height){ createParticles(obj.x,obj.y,obj.color); objects.splice(i,1); score++; document.getElementById('score').innerText='Score: '+score; if(score%10===0){level++; document.getElementById('level').innerText='Level: '+level;} }
  });
  enemies.forEach((e,i)=>{
    let angle=Math.atan2(player.y-e.y,player.x-e.x);
    e.x += Math.cos(angle)*e.speed*(powerActive.slow?0.5:1);
    e.y += Math.sin(angle)*e.speed*(powerActive.slow?0.5:1);
    let dx = e.x-player.x, dy=e.y-player.y, dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<e.size/2+player.size/2){ if(powerActive.shield){createParticles(player.x,player.y,e.color); enemies.splice(i,1); powerActive.shield=false;} else {hitSound.play(); gameOver=true;} }
  });
}

// Power-ups
function updatePowerUps(){
  powerUps.forEach((p,i)=>{
    p.y+=p.speed;
    let dx=p.x-player.x, dy=p.y-player.y, dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<p.size/2+player.size/2){
      powerSound.play();
      if(p.type==='shield'){powerActive.shield=true;}
      else if(p.type==='slow'){powerActive.slow=true; setTimeout(()=>powerActive.slow=false,5000);}
      else if(p.type==='tornado'){tornadoActive=true; setTimeout(()=>tornadoActive=false,5000);}
      powerUps.splice(i,1);
    }
    if(p.y-p.size/2>height) powerUps.splice(i,1);
  });
}

// Game loop
function gameLoop(){
  if(gameOver){ ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillRect(0,0,width,height); ctx.fillStyle='#fff'; ctx.font='48px sans-serif'; ctx.textAlign='center'; ctx.fillText('Game Over!',width/2,height/2-20); ctx.fillText('Score: '+score,width/2,height/2+40); return;}
  ctx.clearRect(0,0,width,height);
  drawPlayer(); drawArray(objects); drawArray(enemies); drawArray(powerUps); drawParticles();
  updateObjects(); updatePowerUps();
  requestAnimationFrame(gameLoop);
}

// Touch
canvas.addEventListener('touchmove',e=>{let t=e.touches[0]; player.x=t.clientX; player.y=t.clientY;});

// Spawning
setInterval(createObject,600);
setInterval(()=>{ if(Math.random()<0.5) createEnemy(); },3000);
setInterval(()=>{ if(Math.random()<0.3) createPowerUp(); },5000);

// Resize
window.addEventListener('resize',()=>{width=window.innerWidth;height=window.innerHeight;canvas.width=width;canvas.height=height;});

gameLoop();
</script>
</body>
</html>
